<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hearts-container"></div>

    <div class="main-container">
        <div class="card">
            <div class="img-box">
                <img src="Screenshot 2026-03-03 155312.png" id="slider-img" alt="Memory">
            </div>

            <div class="text-box">
                <h2 id="title">"Instant Spark"</h2>
                <p id="desc">Your smile makes my day a whole lot brighter. 😊</p>
            </div>

            <div class="nav-controls">
                <button class="nav-btn" id="prev">←</button>
                <button class="music-btn" id="playBtn">🎵 Play Music</button>
                <button class="nav-btn" id="next">→</button>
            </div>
        </div>
    </div>

    <audio id="myAudio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
